name: scout_ops_dash
description: FRC Team 201 scouting dashboard — aggregates Neon, TBA, and Statbotics data.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  url_strategy: ^0.3.0
  bot_path_drawer:
    git:
      url: https://github.com/feds201/feds-central.git
      ref: main
      path: scouting/packages/bot_path_drawer

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Aerna2026.png
