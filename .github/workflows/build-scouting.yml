name: Build Scouting APKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 5.7.0)"
        required: true
      android_notes:
        description: "What's new in Scout Ops Android (blank = no changes)"
        required: false
      scan_notes:
        description: "What's new in Scout Ops Scan (blank = no changes)"
        required: false
      dash_notes:
        description: "What's new in Scout Ops Dash (blank = no changes)"
        required: false
jobs:
  build:
    name: Build & Release APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version in pubspecs
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}+1/" scouting/android/pubspec.yaml
          sed -i "s/^version: .*/version: ${{ inputs.version }}+1/" scouting/scan/pubspec.yaml
          sed -i "s/^version: .*/version: ${{ inputs.version }}+1/" scouting/dash/pubspec.yaml

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build scout-ops-android
        working-directory: scouting/android
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Build scout-ops-scan
        working-directory: scouting/scan
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Build scout-ops-dash
        working-directory: scouting/dash
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Rename APKs
        run: |
          VERSION="${{ inputs.version }}"
          mv scouting/android/build/app/outputs/flutter-apk/app-debug.apk "scout_ops_android_${VERSION}.apk"
          mv scouting/scan/build/app/outputs/flutter-apk/app-debug.apk "scout_ops_scan_${VERSION}.apk"
          mv scouting/dash/build/app/outputs/flutter-apk/app-debug.apk "scout_ops_dash_${VERSION}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          ANDROID="${{ inputs.android_notes }}"
          SCAN="${{ inputs.scan_notes }}"
          DASH="${{ inputs.dash_notes }}"

          cat > release_notes.md <<EOF
          ## Scout Ops Android
          ${ANDROID:-No changes.}

          ## Scout Ops Scan
          ${SCAN:-No changes.}
          EOF

          ## Scout Ops Dash
          ${DASH:-No changes.}

          gh release create "scouting-v${VERSION}" \
            "scout_ops_android_${VERSION}.apk" \
            "scout_ops_scan_${VERSION}.apk" \
            "scout_ops_dash_${VERSION}.apk" \
            --title "[SCOUTING SUITE v${VERSION}]" \
            --notes-file release_notes.md
